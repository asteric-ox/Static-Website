{% extends "admin/base_admin.html" %}
{% block admin_title %}Edit Mass Timing{% endblock %}

{% block admin_content %}
<div class="mb-8 flex items-center gap-4">
  <a href="/admin/mass-timings" class="text-gold-400 hover:text-gold-300">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
  </a>
  <h1 class="font-heading text-2xl font-bold text-white">Edit Mass Timing</h1>
</div>

<div class="stat-card max-w-2xl">
  <form method="POST" class="space-y-6">
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Day</label>
        <select name="day" class="admin-input" required>
          {% for d in ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"] %}
          <option value="{{ d }}" {% if timing.day == d %}selected{% endif %}>{{ d }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Time</label>
        <input type="text" name="time" class="admin-input" value="{{ timing.time }}" required/>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-300 mb-2">Description</label>
      <input type="text" name="description" class="admin-input" value="{{ timing.description }}" required/>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-300 mb-2">Category</label>
      <select name="category" class="admin-input" required>
        <option value="Weekday" {% if timing.category == 'Weekday' %}selected{% endif %}>Weekday</option>
        <option value="Sunday" {% if timing.category == 'Sunday' %}selected{% endif %}>Sunday</option>
      </select>
    </div>

    <div class="pt-4 flex gap-3">
      <button type="submit" class="admin-btn">Save Changes</button>
      <a href="/admin/mass-timings" class="px-6 py-2.5 rounded-lg text-sm font-semibold text-gray-400 hover:bg-white/5 transition-all">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
