{% extends "admin/base_admin.html" %}
{% block admin_title %}Parish Council{% endblock %}

{% block admin_content %}
<div class="flex items-center justify-between mb-8">
  <h1 class="font-heading text-2xl font-bold text-white">Parish Council</h1>
</div>

<!-- Add Form -->
<div class="stat-card mb-8">
  <h2 class="font-heading text-lg font-semibold text-gold-400 mb-4">Add Council Member</h2>
  <form method="POST" action="/admin/parish-council/add" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 items-end">
    <div>
      <label class="block text-xs text-gray-400 mb-1">Name</label>
      <input type="text" name="name" class="admin-input" placeholder="Full Name" required/>
    </div>
    <div>
      <label class="block text-xs text-gray-400 mb-1">Role</label>
      <input type="text" name="role" class="admin-input" placeholder="e.g. Trustee" required/>
    </div>
    <div>
      <label class="block text-xs text-gray-400 mb-1">Image URL</label>
      <input type="text" name="image_url" class="admin-input" placeholder="/static/images/..."/>
    </div>
    <div>
      <label class="block text-xs text-gray-400 mb-1">Phone</label>
      <input type="text" name="phone" class="admin-input" placeholder="+91 ..."/>
    </div>
    <div>
      <button type="submit" class="admin-btn w-full">Add Member</button>
    </div>
  </form>
</div>

<!-- Table -->
<div class="stat-card overflow-x-auto">
  <table class="admin-table">
    <thead>
      <tr><th>Name</th><th>Role</th><th>Phone</th><th>Action</th></tr>
    </thead>
    <tbody>
      {% for m in members %}
      <tr>
        <td class="font-medium text-white">{{ m.name }}</td>
        <td class="text-gold-400">{{ m.role }}</td>
        <td>{{ m.phone or '—' }}</td>
        <td><a href="/admin/parish-council/delete/{{ m.id }}" class="text-red-400 text-xs hover:text-red-300" onclick="return confirm('Remove this member?')">Delete</a></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
