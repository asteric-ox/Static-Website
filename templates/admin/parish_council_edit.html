{% extends "admin/base_admin.html" %}
{% block admin_title %}Edit Council Member{% endblock %}

{% block admin_content %}
<div class="mb-8 flex items-center gap-4">
  <a href="/admin/parish-council" class="text-gold-400 hover:text-gold-300">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
  </a>
  <h1 class="font-heading text-2xl font-bold text-white">Edit Council Member</h1>
</div>

<div class="stat-card max-w-2xl">
  <form method="POST" enctype="multipart/form-data" class="space-y-6">
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Name</label>
        <input type="text" name="name" class="admin-input" value="{{ member.name }}" required/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Role</label>
        <input type="text" name="role" class="admin-input" value="{{ member.role }}" required/>
      </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Phone</label>
        <input type="text" name="phone" class="admin-input" value="{{ member.phone or '' }}"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Date of Birth</label>
        <input type="text" name="dob" class="admin-input" value="{{ member.dob or '' }}" placeholder="DD.MM.YYYY"/>
      </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Feast Day</label>
        <input type="text" name="feast_day" class="admin-input" value="{{ member.feast_day or '' }}" placeholder="e.g. January 20"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Normal Mass Time</label>
        <input type="text" name="normal_mass_time" class="admin-input" value="{{ member.normal_mass_time or '' }}" placeholder="e.g. 6:30 AM"/>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-300 mb-2">Special Mass Time</label>
      <input type="text" name="special_mass_time" class="admin-input" value="{{ member.special_mass_time or '' }}" placeholder="e.g. 10:00 AM"/>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-300 mb-2">Current Photo</label>
      {% if member.image_url %}
      <div class="mb-3">
        <img src="{{ member.image_url }}" class="w-32 h-32 rounded-lg object-cover border border-gold-900/30"/>
      </div>
      {% else %}
      <p class="text-xs text-gray-500 italic mb-3">No photo set</p>
      {% endif %}
      <label class="block text-sm font-medium text-gray-300 mb-2">Update Photo (Optional)</label>
      <input type="file" name="image_file" class="admin-input"/>
      <input type="hidden" name="image_url" value="{{ member.image_url or '' }}"/>
    </div>

    <div class="pt-4 flex gap-3">
      <button type="submit" class="admin-btn">Save Changes</button>
      <a href="/admin/parish-council" class="px-6 py-2.5 rounded-lg text-sm font-semibold text-gray-400 hover:bg-white/5 transition-all">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
